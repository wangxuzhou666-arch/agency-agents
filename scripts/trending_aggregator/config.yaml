# 全网热点聚合配置
# 修改后立即生效（每次运行重新读取）

# 全局参数
globals:
  per_source_timeout: 15      # 单个源最长允许 15s
  total_timeout: 60           # 整体不超过 60s
  max_retries: 3              # 失败重试次数
  retry_backoff_base: 1.5     # 指数退避基数（秒）：1.5, 2.25, 3.375
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
  output_top_n: 20            # 默认输出 top 20
  cross_platform_bonus: 1.5   # 出现在 ≥2 个平台的话题加成倍数
  fuzzy_match_threshold: 0.65 # 跨平台去重阈值（0-1，越高越严格）

# 数据源（enabled=false 即跳过）
# weight 用于聚合评分；rank 越靠前贡献越大：score = weight * (51 - rank)
sources:
  baidu:
    enabled: true
    weight: 1.0
    lang: zh
    description: "百度实时热搜（官方页）"

  bilibili:
    enabled: true
    weight: 0.8
    lang: zh
    description: "B 站热门视频（官方 API）"

  kaola_douyin:
    enabled: true
    weight: 0.95
    lang: zh
    description: "抖音热搜（考拉聚合）"

  kaola_weibo:
    enabled: true
    weight: 0.95
    lang: zh
    description: "微博热搜（考拉聚合）"

  kaola_toutiao:
    enabled: true
    weight: 0.7
    lang: zh
    description: "今日头条热榜（考拉聚合）"

  zhihu:
    enabled: true
    weight: 0.85
    lang: zh
    description: "知乎热榜（readep 镜像）"

  hackernews:
    enabled: true
    weight: 0.9
    lang: en
    description: "Hacker News（官方 API）"

  producthunt:
    enabled: true
    weight: 0.75
    lang: en
    description: "Product Hunt 今日新品"

  google_trends_us:
    enabled: true
    weight: 0.85
    lang: en
    description: "Google Trends US（RSS）"

  x_trends_us:
    enabled: true
    weight: 0.8
    lang: en
    description: "X / Twitter US 趋势（trends24）"
